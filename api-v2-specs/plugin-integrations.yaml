description: "Domain attributes for partially updating a plugin integration. All fields are
optional — fields not included preserve their current value.

Note: `action.headers.authorization` is write-only and never returned in responses.
If `action` is updated while the integration is `enabled`, a new probe is sent.
",
properties: {
