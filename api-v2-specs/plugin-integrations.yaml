}
}
}
},
ConnectionState: {
description: "The state of a plugin integration connection. Determined by the `state` property.

| State | Meaning | Push button appearance |
|---|---|---|
| `connected` | Entity linked to third-party entity | Shows `label`; click opens `targetUrl` |
| `error` | Connection attempt failed | Shows error icon with `message` |
| `progress` | Establishing asynchronously | Shows loading indicator |
| `initial` | No connection (default) | Shows integration's `initialState.label` |
",
oneOf: [
{
$ref: "#/components/schemas/ConnectedState"
},
{
$ref: "#/components/schemas/ErrorState"
},
{
$ref: "#/components/schemas/ProgressState"
},
{
$ref: "#/components/schemas/InitialConnectionState"
}
]
},
ConnectedState: {
type: "object",
description: "Represents a successfully established connection. The push button displays custom
label, hover text, tooltip, color, and a link to the connected entity.
",
required: [
"state",
"label",
"hoverLabel",
"tooltip",
"color",
"targetUrl"
],
properties: {
state: {
type: "string",
enum: [
"connected"
],
description: "Connection state discriminator."
},
label: {
type: "string",
description: "Text on the push button when connected. Typically the entity's current status.",
minLength: 1,
maxLength: 20,
example: "Done"
},
hoverLabel: {
type: "string",
description: "Text on the push button on hover (temporarily replaces `label`). Typically shows the linked entity's identifier.",
minLength: 1,
maxLength: 20,
example: "Issue 123"
},
tooltip: {
type: "string",
description: "Longer tooltip text shown on hover. Ideal for a detailed description of the linked entity.",
minLength: 1,
maxLength: 50,
example: "Issue 123 - Implement XYZ"
},
color: {
type: "string",
description: "Background color of the push button.",
enum: [
"gray",
"blue",
"green",
"yellow",
"orange",
"red",
"purple"
],
example: "green"
},
targetUrl: {
type: "string",
format: "uri",
description: "URL that opens when the user clicks the connected push button. Should link to the connected entity in the third-party system.",
minLength: 1,
maxLength: 1000,
example: "https://example.com/issues/123"
}
}
},
ErrorState: {
type: "object",
description: "Represents a failed connection attempt. The push button displays an error icon with the provided message.",
required: [
"state",
"message"
],
properties: {
state: {
type: "string",
enum: [
"error"
],
description: "Connection state discriminator."
},
message: {
type: "string",
description: "Human-readable error message explaining why the connection could not be established. Shown in the error popup in the Productboard UI.",
minLength: 1,
maxLength: 255,
example: "You don't have permission to create an issue."
},
debugDetail: {
type: "string",
readOnly: true,
description: "Additional debugging information set by Productboard when a push fails on
Productboard's side. **Not visible in the UI** — for developer use during
integration development only. Never set by the partner.
",
maxLength: 8000,
example: "JSON decoding error: field 'targetUrl' is missing"
}
}
},
ProgressState: {
type: "object",
description: "Represents an in-progress connection attempt. The push button shows a loading
indicator.

Use when processing is asynchronous: respond with `progress` immediately from your
action endpoint, then call Configure Connection with the final state once done.
",
required: [
"state"
],
properties: {
state: {
type: "string",
enum: [
"progress"
],
description: "Connection state discriminator."
}
}
},
InitialConnectionState: {
type: "object",
description: "Represents the default, unconnected state. The push button shows the integration's
`initialState.label`. Setting a connection to `initial` via Configure Connection
is equivalent to deleting it.
",
required: [
"state"
],
properties: {
state: {
type: "string",
enum: [
"initial"
],
description: "Connection state discriminator."
}
}
},
ListLinks: {
type: "object",
required: [
"next"
],
properties: {
next: {
type: [
"string",
"null"
]
}
}
},
ErrorSource: {
type: "object",
description: "An object containing references to the source of the error. It helps with location of the problematic field or parameter.
",
properties: {
pointer: {
type: "string",
description: "JSON Pointer [RFC6901] to the associated entity in the request document.
",
example: "/data/fields/status"
},
parameter: {
type: "string",
description: "Query parameter causing the error.
Used when the error is related to a query parameter rather than request body.
",
example: "pageCursor"
}
}
},
Error: {
type: "object",
description: "Individual error object containing the details and context.
",
required: [
"code",
"title",
"detail"
],
properties: {
code: {
type: "string",
description: "A unique, machine-readable and stable code that identifies this error.
Must be consistent across all services and provide clear categorization.
Format: `category.subcategory.specificError`
",
examples: [
"auth.accessDenied",
"resource.notFound"
]
},
title: {
type: "string",
description: "A short, human-readable summary of the problem that doesn't change
from occurrence to occurrence of the problem. Should provide immediate
understanding of the error type.
",
maxLength: 255,
example: "Missing required field"
},
detail: {
type: "string",
description: "A human-readable explanation specific to this occurrence of the problem.
May include suggestions for resolution but should not expose sensitive information.
",
maxLength: 1000,
example: "Field 'status' is required."
},
source: {
$ref: "#/components/schemas/ErrorSource"
}
}
},
ErrorResponse: {
type: "object",
description: "Standard error response structure.
",
required: [
"id",
"errors"
],
properties: {
id: {
type: "string",
description: "A unique identifier for this specific occurrence of the problem.
It carries unique request/response ID which allows client
and server to reference the exact instance of the error
in logs or support communication.
"
},
errors: {
type: "array",
description: "Array of error objects, multiple errors can be returned.",
items: {
$ref: "#/components/schemas/Error"
},
minItems: 1
}
}
}
},
