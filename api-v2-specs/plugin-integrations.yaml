example: "pluginIntegrationConnection"
},
fields: {
$ref: "#/components/schemas/PluginIntegrationConnectionFields"
},
links: {
$ref: "#/components/schemas/PluginIntegrationConnectionLinks"
}
}
},
PluginIntegrationConnectionFields: {
