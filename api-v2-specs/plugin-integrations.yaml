type: "string",
format: "uuid",
readOnly: true,
description: "Unique identifier for this plugin integration.",
example: "00000000-0000-0000-0000-000000000001"
},
links: {
$ref: "#/components/schemas/PluginIntegrationLinks"
}
}
},
PluginIntegrationType: {
type: "string",
description: "Type identifier for the integration. Use your reversed domain name as a prefix to
ensure global uniqueness (e.g., `com.example.myservice`). Integrations of the same
type share the same icon and settings grouping in Productboard.
",
minLength: 1,
maxLength: 255,
example: "com.example.myservice"
},
PluginIntegrationName: {
type: "string",
description: "Human-readable name shown as the column name on the Features board and in Productboard settings.",
minLength: 1,
maxLength: 255,
example: "My Service Integration"
},
PluginIntegrationStatus: {
type: "string",
description: "Controls whether the integration is active:
- `enabled` — integration column is visible and the push button is active
- `disabled` — integration column is hidden from the Features board
",
enum: [
"enabled",
"disabled"
],
default: "enabled",
example: "enabled"
},
PluginIntegrationInitialState: {
type: "object",
description: "Configuration of the push button before an entity has been connected to the third-party system.",
required: [
"label"
],
properties: {
label: {
type: "string",
description: "Label shown on the push button in its initial (unconnected) state.",
minLength: 1,
maxLength: 10,
example: "Push"
}
}
},
Action: {
type: "object",
description: "Configuration for the action endpoint Productboard calls when a user interacts
with a push button (push, unlink, or dismiss).
",
required: [
"url",
"version"
],
properties: {
url: {
type: "string",
format: "uri",
pattern: "https://.+",
description: "HTTPS endpoint Productboard calls when a user clicks a push button.

Requirements:
- Must use `https`
- TLS certificate must be valid and signed by a public authority
- Must be publicly reachable (no `localhost`, private IPs, or internal addresses)
",
maxLength: 1024,
example: "https://example.com/productboard-push"
},
version: {
type: "integer",
description: "Version of the action payload format. Currently only `1` is supported.",
enum: [
1
],
example: 1
},
headers: {
$ref: "#/components/schemas/ActionHeaders"
}
}
},
ActionHeaders: {
type: "object",
description: "Custom headers included in every outgoing request from Productboard to your action
endpoint — both the creation probe and all action notifications.
",
properties: {
authorization: {
type: "string",
writeOnly: true,
description: "Raw value sent in the `Authorization` header of every outgoing request.
This field is **write-only** and never returned in API responses.

Supports any scheme:
- `Basic aGVsbG86d29ybGQ=`
- `Bearer <token>`
- Any custom single-header auth scheme
",
maxLength: 2048,
example: "Bearer my-action-secret"
}
}
},
ActionPayload: {
type: "object",
description: "Payload Productboard sends to your action endpoint when a user clicks a push button.",
required: [
"integrationId",
"trigger",
"feature"
],
properties: {
integrationId: {
type: "string",
format: "uuid",
description: "ID of the plugin integration whose button was clicked.",
example: "00000000-0000-0000-0000-000000000001"
},
trigger: {
type: "string",
description: "Identifies which button the user clicked:
- `button.push` — clicked to connect / push the entity
- `button.unlink` — clicked to unlink the connected entity
- `button.dismiss` — dismissed an error popup
",
enum: [
"button.push",
"button.unlink",
"button.dismiss"
],
example: "button.push"
},
feature: {
type: "object",
description: "The Productboard entity associated with the clicked button.",
required: [
"id",
"links"
],
properties: {
id: {
type: "string",
format: "uuid",
description: "Unique identifier of the entity.",
example: "00000000-0000-0000-0000-000000000002"
},
links: {
type: "object",
required: [
"self",
"html"
],
properties: {
self: {
type: "string",
format: "uri",
description: "API URL to retrieve the entity.",
example: "https://api.productboard.com/features/00000000-0000-0000-0000-000000000002"
},
html: {
type: "string",
format: "uri",
description: "URL to the entity detail page in the Productboard web application.",
example: "https://app.productboard.com/feature-board/1/features/42/detail"
}
}
}
}
},
triggeredByUser: {
type: "object",
description: "The Productboard user who triggered the action.",
required: [
"name",
"email"
],
properties: {
name: {
type: "string",
description: "Display name of the user.",
example: "Jane Doe"
},
email: {
type: "string",
format: "email",
description: "Email address of the user.",
example: "jane.doe@example.com"
}
}
},
links: {
type: "object",
description: "Relevant links for this action notification.",
required: [
"connection"
],
properties: {
connection: {
type: "string",
format: "uri",
description: "URL of the plugin integration connection for this entity. Use this endpoint
to update the connection state asynchronously after processing the action.
",
example: "https://api.productboard.com/v2/plugin-integrations/00000000-0000-0000-0000-000000000001/connections/00000000-0000-0000-0000-000000000002"
}
}
}
}
},
