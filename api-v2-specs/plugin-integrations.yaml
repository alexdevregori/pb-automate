application/json: {
schema: {
type: "object",
required: [
"data"
],
properties: {
data: {
type: "object",
required: [
"fields"
],
properties: {
fields: {
type: "object",
required: [
"connection"
],
properties: {
connection: {
$ref: "#/components/schemas/ConnectionState"
}
}
}
}
}
}
}
}
}
},
