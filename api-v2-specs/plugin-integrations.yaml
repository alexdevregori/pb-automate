$ref: "#/components/schemas/ActionPayload"
}
}
}
}
}
},
responses: {
200: {
description: "Respond with the resulting connection state. Any valid `ConnectionState`
is accepted. Setting `state: initial` resets the connection (equivalent
to deleting it).
",
