{
openapi: "3.1.1",
info: {
title: "Plugin Integrations",
description: "Manages plugin integrations and their connections.

A **plugin integration** defines how Productboard communicates with your system when
a user interacts with a push button on an entity. When the button is clicked, Productboard
sends an **action notification** (POST) to your configured endpoint. Your endpoint responds
with a connection state, which controls how the button is rendered.

A **plugin integration connection** represents the relationship between a Productboard
entity and an entity in the third-party system for a given integration.

**Probe verification**: on integration creation (and on update when enabled), Productboard
sends a GET probe to your action URL to verify it is reachable. See the `callbacks` section.

**`action` is write-only**: action configuration (including any `headers.authorization`
secret) is never returned in API responses.
",
