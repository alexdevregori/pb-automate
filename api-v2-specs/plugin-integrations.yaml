Note: `action` is intentionally absent — it contains a write-only authorization
secret that is never returned by the API.
",
required: [
"type",
"name",
"integrationStatus",
"initialState"
],
properties: {
type: {
$ref: "#/components/schemas/PluginIntegrationType"
},
name: {
$ref: "#/components/schemas/PluginIntegrationName"
},
integrationStatus: {
$ref: "#/components/schemas/PluginIntegrationStatus"
},
initialState: {
$ref: "#/components/schemas/PluginIntegrationInitialState"
}
}
},
PluginIntegrationLinks: {
